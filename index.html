<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interactive Birthday Card</title>
    <link rel="stylesheet" href="style.css" />
    <!-- GSAP for smooth animation (optional but allowed) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.2/gsap.min.js"></script>
</head>
<body>
    <!-- Wrapper to help center everything and provide perspective for 3D transforms -->
    <div class="scene">
        <!-- sealed envelope (clickable) -->
        <div class="envelope" id="envelope">
            <!-- top flap that will rotate when opened -->
            <div class="flap"></div>
            <!-- body of the envelope -->
            <div class="body"></div>
        </div>

        <!-- container for the 3D card to allow full rotation -->
        <div class="card-container" id="cardContainer">
            <!-- 3D folded birthday card -->
            <div class="card" id="card">
                <!-- front panel of the card -->
                <div class="panel front-panel">
                    <div class="front-content">
                        <h1>Happy Birthday!</h1>
                    </div>
                </div>
                <!-- inside panel of the card (connected via hinge) -->
                <div class="panel inside-panel">
                    <div class="inside-content">
                        <!-- 3D pop-up birthday cake -->
                        <div class="pop-up-cake" id="cake">
                            <!-- cake layers (bottom to top) -->
                            <div class="cake-layer bottom"></div>
                            <div class="cake-layer middle"></div>
                            <div class="cake-layer top"></div>
                            <!-- decorative elements -->
                            <div class="decoration candle"></div>
                            <div class="decoration balloon left"></div>
                            <div class="decoration balloon right"></div>
                            <div class="decoration confetti"></div>
                        </div>
                        <!-- birthday message -->
                        <div class="message">
                            <p>Wishing you a day filled with love, laughter, and cake!</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
